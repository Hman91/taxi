name: taxi_pro
description: Taxi Pro Tunisia — Flutter client for the Flask API
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  http: ^1.2.0
  socket_io_client: ^2.0.3+1
  url_launcher: ^6.3.0
  geolocator: ^13.0.2
  google_sign_in: ^6.2.1
  google_sign_in_web: ^0.12.4
  flutter_local_notifications: ^17.2.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
